<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Care Dashboard</title>
    <!-- 引入 Bootstrap 5 圖示庫 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* 基礎全域設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----------------------------------
           頂部 1/6 核心顯示介面（經修正）
        ------------------------------------- */
        .top-dashboard-header {
            height: 16.67vh;
            min-height: 135px; /* 稍微提高確保縱向空間舒適 */
            background-color: #1e1e1e;
            border-bottom: 2px solid #2d2d2d;
            display: flex;
            width: 100%;
        }

        /* 共同欄位基礎樣式 */
        .header-section {
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 由上至下均分三到四行空間 */
            font-size: 11px;
        }

        /* [區塊 1] 最左邊 1/5 區塊 */
        .sec-left-nav {
            width: 20%;
            min-width: 85px;
            border-right: 1px solid #2d2d2d;
            align-items: center;
            text-align: center;
        }
        .date-display {
            font-size: 11px;
            color: #aaaaaa;
        }
        .current-time {
            font-size: 18px;
            font-weight: 700;
            color: #00adb5;
            line-height: 1.1;
        }
        .patient-id {
            font-size: 12px;
            font-weight: 600;
            color: #eeeeee;
            white-space: nowrap;
            margin: 2px 0;
        }
        .action-btn-group {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
        }
        .nav-oval-btn {
            flex: 1;
            max-width: 32px;
            height: 18px;
            background-color: #333333;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
        }
        .nav-oval-btn:active {
            background-color: #00adb5;
        }

        /* [區塊 2] 中間區塊：佔剩下 80% 的 2/5 (實質總寬度 32%) */
        .sec-mid-clinical {
            width: 32%;
            border-right: 1px solid #2d2d2d;
            color: #e0e0e0;
        }
        .clinical-row {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .diagnosis-highlight {
            color: #ffb400; /* 亮黃色突顯中風診斷 */
            font-weight: bold;
        }
        .etiology-style {
            color: #a3daff; /* 淡藍色區隔病因學 */
        }

        /* [區塊 3] 右邊區塊：佔剩下 80% 的 3/5 (實質總寬度 48%) */
        .sec-right-timestamps {
            width: 48%;
            justify-content: space-between; /* 確保四個時間點均勻上下排列 */
        }
        
        /* 橫向單行排版容器：標籤、日期、時間全部在同一行 */
        .timestamp-line {
            display: flex;
            justify-content: space-between; /* 標籤靠左，時間日期靠右 */
            align-items: center;
            width: 100%;
            border-bottom: 1px dashed #2a2a2a; /* 輕微視覺導線，方便手機橫向對齊 */
            padding-bottom: 1px;
        }
        .timestamp-line:last-child {
            border-bottom: none;
        }
        .timestamp-label {
            font-weight: bold;
            color: #00adb5;
            min-width: 42px;
        }
        .timestamp-value {
            color: #ffffff;
            font-family: monospace; /* 等寬字體讓時間排列更整齊 */
            text-align: right;
            white-space: nowrap;
        }

        /* ----------------------------------
           下方 5/6 頁籤與內容呈現區
        ------------------------------------- */
        .main-container {
            height: 83.33vh;
            display: flex;
            flex-direction: column;
        }
        .dashboard-tabs {
            display: flex;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2d2d2d;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #888888;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #00adb5;
            border-bottom: 3px solid #00adb5;
            background-color: #222222;
        }
        .tab-content-panel {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: none;
        }
        .tab-content-panel.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- 最上方 1/6 顯示介面 -->
    <header class="top-dashboard-header">
        
        <!-- [左側 1/5] 時間、個案編號、控制鈕 -->
        <div class="header-section sec-left-nav">
            <div>
                <div class="date-display" id="live-date">05/24</div>
                <div class="current-time" id="live-clock">00:00</div>
            </div>
            <div class="patient-id">11505-003</div>
            <div class="action-btn-group">
                <a href="#" class="nav-oval-btn">N</a>
                <a href="#" class="nav-oval-btn"><i class="bi bi-arrow-up"></i></a>
                <a href="#" class="nav-oval-btn"><i class="bi bi-arrow-down"></i></a>
            </div>
        </div>
        
        <!-- [中間 2/5] 臨床資訊（診斷與 Etiology 拆分換行） -->
        <div class="header-section sec-mid-clinical">
            <div class="clinical-row"><strong>67 歲 / 男</strong></div>
            <div class="clinical-row">172 cm / 68 kg</div>
            <div class="clinical-row diagnosis-highlight">Ischemic Stroke</div>
            <div class="clinical-row etiology-style">LVO (L-MCA)</div>
        </div>
        
        <!-- [右側 3/5] 四個時間點（由上往下排列，日期與時間強制同一行） -->
        <div class="header-section sec-right-timestamps">
            <div class="timestamp-line">
                <span class="timestamp-label">Onset</span>
                <span class="timestamp-value">05/23 14:20</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">ER</span>
                <span class="timestamp-value">05/23 15:10</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">入院</span>
                <span class="timestamp-value">05/23 18:30</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">出院</span>
                <span class="timestamp-value">--/-- --:--</span>
            </div>
        </div>

    </header>

    <!-- 下方 5/6 切換功能介面 -->
    <main class="main-container">
        <nav class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchTab('er-icu')">ER/ICU</button>
            <button class="tab-btn" onclick="switchTab('ward')">Ward</button>
            <button class="tab-btn" onclick="switchTab('others')">Others</button>
        </nav>

        <div id="overview" class="tab-content-panel active">
            <h4>Overview 總覽面板</h4>
            <p style="color: #aaa; margin-top: 10px;">當前呈現比例：中間臨床區 (32%) : 右側時間區 (48%)。右側時間點已切換為嚴格單行橫向對齊。</p>
        </div>

        <div id="er-icu" class="tab-content-panel">
            <h4>ER / ICU 急重症紀錄</h4>
        </div>

        <div id="ward" class="tab-content-panel">
            <h4>Ward 普通病房常規</h4>
        </div>

        <div id="others" class="tab-content-panel">
            <h4>Others 其他資訊</h4>
        </div>
    </main>

    <script>
        // 動態時間與日期更新邏輯
        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            document.getElementById('live-date').textContent = `${month}/${date}`;
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 頁籤切換邏輯
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
