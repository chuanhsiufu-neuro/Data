<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Care Dashboard</title>
    <!-- 引入 Bootstrap 5 圖示庫 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* 基礎全域設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----------------------------------
           頂部 1/6 核心顯示介面
        ------------------------------------- */
        .top-dashboard-header {
            height: 16.67vh;
            min-height: 140px; /* 提高以完美容納換行後的加大字體 */
            background-color: #1e1e1e;
            border-bottom: 2px solid #2d2d2d;
            display: flex;
            width: 100%;
            position: relative; /* 供側拉按鈕絕對定位 */
        }

        .header-section {
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 11px;
        }

        /* [區塊 1] 最左邊 1/5 區塊 */
        .sec-left-nav {
            width: 20%;
            min-width: 90px;
            border-right: 1px solid #2d2d2d;
            align-items: center;
            text-align: center;
        }
        .date-display {
            font-size: 11px;
            color: #aaaaaa;
        }
        .current-time {
            font-size: 18px;
            font-weight: 700;
            color: #00adb5;
            line-height: 1.1;
        }
        
        /* 個案編號加大並換行 */
        .patient-id-box {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            margin: 4px 0;
        }
        .pid-top {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }
        .pid-bottom {
            font-size: 16px;
            font-weight: 800;
            color: #00adb5; /* 用不同顏色凸顯流水號，方便核對 */
        }

        /* 縮減為兩個按鈕，寬度各半加大 */
        .action-btn-group {
            display: flex;
            gap: 4px;
            width: 100%;
        }
        .nav-oval-btn {
            flex: 1; /* 各佔 50% */
            height: 26px; /* 加高更方便手機點擊 */
            background-color: #333333;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }
        .nav-oval-btn:active {
            background-color: #00adb5;
            border-color: #00adb5;
        }

        /* [區塊 2] 中間區塊：2/5 */
        .sec-mid-clinical {
            width: 32%;
            border-right: 1px solid #2d2d2d;
            color: #e0e0e0;
            padding-right: 12px; /* 為中間的側拉鈕留點視覺空間 */
        }
        .clinical-row {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .diagnosis-highlight {
            color: #ffb400;
            font-weight: bold;
        }
        .etiology-style {
            color: #a3daff;
        }

        /* [區塊 3] 右邊區塊：3/5 */
        .sec-right-timestamps {
            width: 48%;
            padding-left: 12px;
        }
        .timestamp-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 1px dashed #2a2a2a;
            padding-bottom: 1px;
        }
        .timestamp-line:last-child {
            border-bottom: none;
        }
        .timestamp-label {
            font-weight: bold;
            color: #00adb5;
            min-width: 35px;
        }
        .timestamp-value {
            color: #ffffff;
            font-family: monospace;
            text-align: right;
            white-space: nowrap;
        }

        /* ----------------------------------
           2/5 與 3/5 中間的側拉功能設計
        ------------------------------------- */
        /* 位於分界線上的細長型觸發按鈕 */
        .drawer-trigger-btn {
            position: absolute;
            left: 52%; /* 20% + 32% 正好是分界線 */
            top: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 45px;
            background-color: #00adb5;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 8px rgba(0, 173, 181, 0.4);
        }

        /* 側拉隱藏面板背層（遮罩） */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.5);
            z-index: 99;
            display: none; /* 預設隱藏 */
        }
        
        /* 側拉面板本體 */
        .slide-drawer {
            position: fixed;
            top: 0;
            right: -280px; /* 預設完全藏在右邊之外 */
            width: 280px;
            height: 100vh;
            background-color: #1e1e1e;
            border-left: 2px solid #00adb5;
            z-index: 100;
            transition: right 0.3s ease; /* 滑動動畫 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        /* 當啟用時滑入畫面 */
        .slide-drawer.open {
            right: 0;
        }
        .drawer-title {
            font-size: 16px;
            font-weight: bold;
            color: #00adb5;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-drawer-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* 提供未來功能擴充的編輯頁按鈕樣式 */
        .edit-redirect-btn {
            width: 100%;
            padding: 12px;
            background-color: #2b2b2b;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .edit-redirect-btn:active {
            background-color: #333;
            border-color: #00adb5;
        }
        .edit-redirect-btn i {
            color: #00adb5;
        }

        /* ----------------------------------
           下方 5/6 頁籤與內容呈現區
        ------------------------------------- */
        .main-container {
            height: 83.33vh;
            display: flex;
            flex-direction: column;
        }
        .dashboard-tabs {
            display: flex;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2d2d2d;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #888888;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #00adb5;
            border-bottom: 3px solid #00adb5;
            background-color: #222222;
        }
        .tab-content-panel {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: none;
        }
        .tab-content-panel.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- 最上方 1/6 顯示介面 -->
    <header class="top-dashboard-header">
        
        <!-- [左側 1/5] 時間、編號換行加大、大按鈕組 -->
        <div class="header-section sec-left-nav">
            <div>
                <div class="date-display" id="live-date">115.05.24</div>
                <div class="current-time" id="live-clock">00:00</div>
            </div>
            
            <!-- 編號字體加大並拆分兩行 -->
            <div class="patient-id-box">
                <span class="pid-top">11505</span>
                <span class="pid-bottom">003</span>
            </div>
            
            <!-- 只保留兩個按鈕：N、與下載圖示，各佔 50% -->
            <div class="action-btn-group">
                <a href="#" class="nav-oval-btn">N</a>
                <a href="#" class="nav-oval-btn" title="下載資料"><i class="bi bi-download"></i></a>
            </div>
        </div>
        
        <!-- [中間 2/5] 臨床資訊 -->
        <div class="header-section sec-mid-clinical">
            <div class="clinical-row"><strong>67 歲 / 男</strong></div>
            <div class="clinical-row">172 cm / 68 kg</div>
            <div class="clinical-row diagnosis-highlight">Ischemic Stroke</div>
            <div class="clinical-row etiology-style">LVO (L-MCA)</div>
        </div>
        
        <!-- [2/5 與 3/5 中間的側拉觸發鈕] -->
        <div class="drawer-trigger-btn" onclick="toggleDrawer(true)">
            <i class="bi bi-chevron-left"></i>
        </div>
        
        <!-- [右側 3/5] 四個時間點（格式全面修正為：年.月.日 時:分） -->
        <div class="header-section sec-right-timestamps">
            <div class="timestamp-line">
                <span class="timestamp-label">Onset</span>
                <span class="timestamp-value">115.05.23 14:20</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">ER</span>
                <span class="timestamp-value">115.05.23 15:10</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">入院</span>
                <span class="timestamp-value">115.05.23 18:30</span>
            </div>
            <div class="timestamp-line">
                <span class="timestamp-label">出院</span>
                <span class="timestamp-value">---.--.-- --:--</span>
            </div>
        </div>

    </header>

    <!-- 下方 5/6 切換功能介面 -->
    <main class="main-container">
        <nav class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchTab('er-icu')">ER/ICU</button>
            <button class="tab-btn" onclick="switchTab('ward')">Ward</button>
            <button class="tab-btn" onclick="switchTab('others')">Others</button>
        </nav>

        <div id="overview" class="tab-content-panel active">
            <h4>Overview 總覽面板</h4>
            <p style="color: #aaa; margin-top: 10px;">點擊上方正中央的青色小箭頭，即可拉出「擴充編輯功能」側邊欄。</p>
        </div>
        <div id="er-icu" class="tab-content-panel"><h4>ER / ICU 急重症紀錄</h4></div>
        <div id="ward" class="tab-content-panel"><h4>Ward 普通病房常規</h4></div>
        <div id="others" class="tab-content-panel"><h4>Others 其他資訊</h4></div>
    </main>

    <!-- ----------------------------------
       側拉隱藏選單（未來功能擴充區）
    ------------------------------------- -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer(false)"></div>
    <div class="slide-drawer" id="sideDrawer">
        <div class="drawer-title">
            <span>資料編輯與擴充</span>
            <button class="close-drawer-btn" onclick="toggleDrawer(false)"><i class="bi bi-x-lg"></i></button>
        </div>
        
        <!-- 預留給未來連結到獨立編輯頁面的按鈕群組 -->
        <button class="edit-redirect-btn" onclick="location.href='edit_base.html'">
            <i class="bi bi-person-gear"></i> 編輯基本資料 / 診斷
        </button>
        <button class="edit-redirect-btn" onclick="location.href='edit_er.html'">
            <i class="bi bi-heart-pulse"></i> 編輯 ER / ICU 數據
        </button>
        <button class="edit-redirect-btn" onclick="location.href='edit_ward.html'">
            <i class="bi bi-clipboard-check"></i> 編輯 Ward 病房紀錄
        </button>
        <button class="edit-redirect-btn" onclick="location.href='edit_timestamps.html'">
            <i class="bi bi-clock-history"></i> 修改關鍵時序 (Timeline)
        </button>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // 1. 動態時間與日期（民國格式化）
        function updateClock() {
            const now = new Date();
            // 轉換為民國年
            const tianwanYear = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            document.getElementById('live-date').textContent = `${tianwanYear}.${month}.${date}`;
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 下方頁籤切換
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 3. 側拉選單顯示/隱藏控制
        function toggleDrawer(isOpen) {
            const drawer = document.getElementById('sideDrawer');
            const overlay = document.getElementById('drawerOverlay');
            if (isOpen) {
                drawer.classList.add('open');
                overlay.style.display = 'block';
            } else {
                drawer.classList.remove('open');
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
