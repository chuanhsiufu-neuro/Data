<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神經照護衛教寶盒 NeuroCare Box</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --primary: #4f7cff;
      --primary-dark: #3158d4;
      --sky: #dff4ff;
      --mint: #dffcf0;
      --peach: #fff1e8;
      --pink: #ffe8f1;
      --lavender: #eee9ff;
      --ink: #1f2937;
      --muted: #64748b;
      --card: rgba(255, 255, 255, .92);
      --line: #dbeafe;
      --shadow: 0 14px 34px rgba(79, 124, 255, .14);
    }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      line-height: 1.75;
      background:
        radial-gradient(circle at 10% 8%, #ffe8f1 0, transparent 28%),
        radial-gradient(circle at 90% 5%, #dff4ff 0, transparent 30%),
        radial-gradient(circle at 88% 88%, #dffcf0 0, transparent 25%),
        linear-gradient(180deg, #f7fbff 0%, #f8fafc 100%);
      min-height: 100vh;
    }
    header {
      position: relative;
      overflow: hidden;
      color: white;
      padding: 38px 20px 34px;
      text-align: center;
      background: linear-gradient(135deg, #6ea8ff 0%, #6c63ff 52%, #8e8cff 100%);
      border-bottom-left-radius: 34px;
      border-bottom-right-radius: 34px;
      box-shadow: 0 16px 36px rgba(49, 88, 212, .25);
    }
    header::before, header::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
    }
    header::before { width: 160px; height: 160px; left: -50px; top: -45px; }
    header::after { width: 210px; height: 210px; right: -70px; bottom: -105px; }
    header h1 {
      position: relative;
      margin: 0;
      font-size: 34px;
      letter-spacing: .5px;
      text-shadow: 0 2px 10px rgba(0,0,0,.12);
    }
    header h1::before { content: "🧠 "; }
    header h1::after { content: " 🩺"; }
    header p {
      position: relative;
      margin: 10px auto 0;
      font-size: 16px;
      opacity: .96;
      max-width: 760px;
    }
    .hero-badges {
      position: relative;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .hero-badge {
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.36);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }
    .container {
      max-width: 1240px;
      margin: 28px auto;
      padding: 0 16px 46px;
      display: grid;
      grid-template-columns: .95fr 1.18fr;
      gap: 22px;
    }
    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(219, 234, 254, .85);
      backdrop-filter: blur(10px);
    }
    h2 {
      margin-top: 0;
      color: #2745b8;
      font-size: 22px;
      border: 0;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: "✦";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #6ea8ff, #8e8cff);
      box-shadow: 0 8px 18px rgba(79, 124, 255, .22);
    }
    h3 { color: #243b8f; margin-bottom: 8px; }
    h4 { margin: 12px 0 7px; color: #3158d4; }
    .section {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.84), rgba(248,250,252,.84));
      border: 1px solid #edf2ff;
    }
    .grid-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    label.option {
      display: flex;
      gap: 9px;
      align-items: center;
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 11px 12px;
      cursor: pointer;
      font-size: 15px;
      transition: .18s ease;
      box-shadow: 0 5px 14px rgba(148, 163, 184, .10);
    }
    label.option:hover {
      transform: translateY(-1px);
      background: #f0f7ff;
      border-color: #93c5fd;
      box-shadow: 0 10px 20px rgba(79, 124, 255, .13);
    }
    label.option input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }
    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid #cfe2ff;
      font-size: 15px;
      background: white;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 124, 255, .14);
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      padding: 12px 19px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, #4f7cff, #6c63ff);
      color: white;
      box-shadow: 0 10px 20px rgba(79, 124, 255, .28);
    }
    .primary::before { content: "✨ "; }
    .secondary {
      background: #e9efff;
      color: #2745b8;
    }
    .secondary::before { content: "🖨️ "; }
    .danger {
      background: #ffe8e8;
      color: #b42318;
    }
    .danger::before { content: "↺ "; }
    .result-box {
      background:
        linear-gradient(180deg, rgba(255,255,255,.86), rgba(248,250,252,.92));
      border: 2px dashed #b7d7ff;
      border-radius: 24px;
      padding: 18px;
      min-height: 360px;
    }
    .tag {
      display: inline-block;
      background: linear-gradient(135deg, #e0f2fe, #e9d5ff);
      color: #2745b8;
      border-radius: 999px;
      padding: 5px 11px;
      margin: 4px;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid rgba(147, 197, 253, .72);
    }
    .edu-block {
      background: white;
      border-radius: 22px;
      padding: 17px;
      margin: 16px 0;
      border-left: 0;
      border: 1px solid #dbeafe;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .06);
      position: relative;
      overflow: hidden;
    }
    .edu-block::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #6ea8ff, #9b8cff, #74d6b5);
    }
    .edu-block h3 { margin-top: 6px; }
    .warning {
      background: linear-gradient(180deg, #fffdf8, #fff7ed);
      border-color: #fed7aa;
    }
    .warning::before { background: linear-gradient(90deg, #fb7185, #fb923c); }
    .success {
      background: linear-gradient(180deg, #fbfffd, #f0fdf4);
      border-color: #bbf7d0;
    }
    .success::before { background: linear-gradient(90deg, #34d399, #60a5fa); }
    .soft {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border-color: #e2e8f0;
    }
    .soft::before { background: linear-gradient(90deg, #94a3b8, #c4b5fd); }
    .family-note {
      background: linear-gradient(135deg, #eef6ff, #f5f3ff);
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 11px 13px;
      margin: 10px 0;
      color: #2745b8;
      font-weight: 800;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 12px 0;
    }
    .mini-card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid #dbeafe;
      border-radius: 20px;
      padding: 12px 10px;
      text-align: center;
      min-height: 100px;
      box-shadow: 0 6px 16px rgba(148, 163, 184, .12);
    }
    .mini-card .icon { font-size: 32px; display: block; margin-bottom: 4px; }
    .callout-red {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
      font-weight: 800;
    }
    .callout-red::before { content: "🚨 "; }
    .callout-green {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: 18px;
      padding: 12px;
      margin: 12px 0;
      font-weight: 800;
    }
    .callout-green::before { content: "🌿 "; }
    .visual-box {
      background: #ffffff;
      border: 1px solid #c7ddff;
      border-radius: 20px;
      padding: 13px;
      margin-top: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }
    .svg-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #eff6ff, #f5f3ff);
      border-radius: 18px;
      padding: 12px;
      margin: 9px 0;
      overflow-x: auto;
    }
    svg text { font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; font-size: 13px; fill: #1e3a8a; font-weight: 800; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 10px;
      font-size: 14px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #dbeafe;
    }
    th, td {
      border-bottom: 1px solid #dbeafe;
      padding: 9px;
      text-align: left;
      vertical-align: top;
      background: #fff;
    }
    tr:last-child td { border-bottom: 0; }
    th {
      background: linear-gradient(135deg, #e0f2fe, #eef2ff);
      color: #2745b8;
      font-weight: 900;
    }
    ul { padding-left: 22px; }
    li { margin: 5px 0; }
    .footer-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 13px;
      background: rgba(255,255,255,.72);
      border-radius: 14px;
      padding: 10px;
    }
    .print-title { display: none; }
    @media (max-width: 900px) {
      header h1 { font-size: 27px; }
      .container { grid-template-columns: 1fr; }
      .grid-options, .mini-grid { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white; }
      header, .input-card, .buttons, .footer-note { display: none !important; }
      .container { display: block; margin: 0; padding: 0; }
      .card { box-shadow: none; border: none; padding: 0; }
      .print-title { display: block; text-align: center; color: #111827; }
      .result-box { border: none; background: white; }
      .edu-block { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>神經照護衛教寶盒 NeuroCare Box</h1>
    <p>神經內外科病房個別化衛教平台｜護理師快速產生家屬版衛教內容</p>
  </header>

  <main class="container">
    <section class="card input-card">
      <h2>一、選擇病人狀況</h2>

      <div class="section">
        <h3>基本資料</h3>
        <input type="text" id="patientName" placeholder="病人姓名或床號，例如：5D-01 王先生" />
      </div>

      <div class="section">
        <h3>診斷（可自行輸入）</h3>
        <input type="text" id="customDiagnosis" placeholder="例如：腦中風、腦出血、癲癇、脊椎手術後、腦瘤..." />
      </div>

      <div class="section">
        <h3>目前管路或設備</h3>
        <div class="grid-options">
          <label class="option"><input type="checkbox" value="鼻胃管" class="tube" />鼻胃管 NG tube</label>
          <label class="option"><input type="checkbox" value="尿管" class="tube" />尿管 Foley</label>
          <label class="option"><input type="checkbox" value="氣切" class="tube" />氣切 Tracheostomy</label>
          <label class="option"><input type="checkbox" value="引流管" class="tube" />引流管 Drainage Tube</label>
          <label class="option"><input type="checkbox" value="氧氣" class="tube" />氧氣設備 Oxygen</label>
        </div>
      </div>

      <div class="section">
        <h3>主要照護需求</h3>
        <div style="margin:10px 0 14px;background:linear-gradient(135deg,#fff4e6,#fff0f6);padding:12px 14px;border-radius:18px;border:1px solid #fed7aa;color:#c2410c;font-weight:800;">
          ⭐ 腦中風病人記得勾選「腦中風基本認識」作為核心衛教。
        </div>
        <div class="grid-options">
          <label class="option"><input type="checkbox" value="腦中風基本認識" class="care" />腦中風基本認識</label>
          <label class="option"><input type="checkbox" value="抗凝劑使用注意事項" class="care" />抗凝劑／抗血小板藥物注意事項</label>
          <label class="option"><input type="checkbox" value="跌倒預防" class="care" />跌倒預防</label>
          <label class="option"><input type="checkbox" value="吞嚥困難" class="care" />吞嚥困難／嗆咳</label>
          <label class="option"><input type="checkbox" value="翻身拍背" class="care" />翻身與拍痰</label>
          <label class="option"><input type="checkbox" value="偏癱擺位" class="care" />偏癱肢體擺位</label>
          <label class="option"><input type="checkbox" value="壓傷預防" class="care" />壓傷預防</label>
          <label class="option"><input type="checkbox" value="出院長照" class="care" />出院長照銜接</label>
          <label class="option"><input type="checkbox" value="高血糖飲食" class="care" />預防高血糖飲食</label>
          <label class="option"><input type="checkbox" value="高血脂飲食" class="care" />預防高血脂飲食</label>
          <label class="option"><input type="checkbox" value="高血壓照護" class="care" />高血壓照護</label>
          <label class="option"><input type="checkbox" value="被動關節運動" class="care" />被動關節運動</label>
          <label class="option"><input type="checkbox" value="助行器使用" class="care" />助行器使用</label>
          <label class="option"><input type="checkbox" value="約束注意事項" class="care" />約束注意事項</label>
          <label class="option"><input type="checkbox" value="物理復健" class="care" />物理復健</label>
          <label class="option"><input type="checkbox" value="職能復健" class="care" />職能復健</label>
          <label class="option"><input type="checkbox" value="藥物與慢性病控制" class="care" />藥物與慢性病控制的重要性</label>
        </div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="generateEducation()">產生衛教內容</button>
        <button class="secondary" onclick="downloadPDF()">列印／存成PDF</button>
        <button class="danger" onclick="resetForm()">清除重選</button>
      </div>

      <p class="footer-note">提醒：本網站為衛教輔助工具，實際照護仍須依醫囑、病人狀況及院內SOP調整。</p>
    </section>

    <section class="card">
      <h2>二、個別化衛教單</h2>
      <h1 class="print-title">神經內外科病房個別化衛教單</h1>
      <div style="margin-bottom:14px;background:linear-gradient(135deg,#eef6ff,#f5f3ff);padding:12px 14px;border-radius:18px;border:1px solid #dbeafe;color:#3158d4;font-weight:700;">
        💡 使用方式：左側勾選病人狀況 → 產生衛教內容 → 點選「列印／存成PDF」即可提供病人家屬。
      </div>
      <div id="result" class="result-box">
        請先選擇左側病人狀況，點選「產生衛教內容」。
      </div>
    </section>
  </main>

  <script>
    const languageTable = `
      <div class="edu-block">
        <h3>🌏 多語言照護提醒</h3>
        <p class="family-note">給外籍看護：以下是病房最常用的照護句子，可搭配動作示範。</p>
        <table>
          <tr><th>中文</th><th>English</th><th>印尼文 Bahasa Indonesia</th></tr>
          <tr><td>每2小時翻身一次</td><td>Turn every 2 hours.</td><td>Miringkan tubuh setiap 2 jam.</td></tr>
          <tr><td>請把床欄拉起來</td><td>Keep the side rails up.</td><td>Naikkan pagar tempat tidur.</td></tr>
          <tr><td>下床前請先按鈴</td><td>Please call the nurse before getting out of bed.</td><td>Tekan bel sebelum turun dari tempat tidur.</td></tr>
          <tr><td>吃東西請慢慢吞</td><td>Eat slowly and swallow carefully.</td><td>Makan perlahan dan telan dengan hati-hati.</td></tr>
          <tr><td>若嗆咳請立即停止餵食</td><td>Stop feeding if choking occurs.</td><td>Hentikan makan jika tersedak.</td></tr>
          <tr><td>請協助拍痰</td><td>Please help with chest percussion.</td><td>Tolong bantu tepuk punggung untuk mengeluarkan dahak.</td></tr>
          <tr><td>不要拉扯管路</td><td>Do not pull the tube.</td><td>Jangan menarik selang.</td></tr>
        </table>
      </div>`;

    function checkedValues(className) {
      return Array.from(document.querySelectorAll('.' + className + ':checked')).map(el => el.value);
    }

    function block(title, content, cls = '') {
      return `<div class="edu-block ${cls}"><h3>${title}</h3>${content}</div>`;
    }

    function threeSteps(a, b, c) {
      return `<div class="mini-grid">
        <div class="mini-card"><span class="icon">1️⃣</span>${a}</div>
        <div class="mini-card"><span class="icon">2️⃣</span>${b}</div>
        <div class="mini-card"><span class="icon">3️⃣</span>${c}</div>
      </div>`;
    }

    function strokeFaceArmSpeechSvg() {
      return `<div class="visual-box"><strong>圖像提醒：FAST 中風警訊</strong>
        <div class="svg-wrap">
          <svg width="520" height="150" viewBox="0 0 520 150" role="img" aria-label="FAST中風警訊示意圖">
            <circle cx="70" cy="55" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
            <path d="M55 62 Q70 78 86 62" stroke="#dc2626" stroke-width="4" fill="none"/>
            <circle cx="58" cy="50" r="4" fill="#1e3a8a"/><circle cx="82" cy="50" r="4" fill="#1e3a8a"/>
            <text x="35" y="120">臉歪 Face</text>
            <line x1="150" y1="88" x2="215" y2="45" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
            <line x1="150" y1="88" x2="215" y2="105" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/>
            <text x="142" y="120">手無力 Arm</text>
            <rect x="275" y="30" width="95" height="55" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
            <text x="292" y="63">說不清</text>
            <text x="282" y="120">Speech</text>
            <circle cx="440" cy="58" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
            <text x="430" y="64">119</text>
            <text x="397" y="120">立即就醫 Time</text>
          </svg>
        </div>
      </div>`;
    }

    function evdSvg() {
      return `<div class="visual-box"><strong>圖像提醒：引流管不可拉扯或自行調整</strong>
        <div class="svg-wrap">
          <svg width="520" height="210" viewBox="0 0 520 210" role="img" aria-label="EVD高度示意圖">
            <rect x="40" y="110" width="180" height="48" rx="12" fill="#bfdbfe"/>
            <circle cx="105" cy="85" r="34" fill="#fde68a" stroke="#92400e" stroke-width="3"/>
            <circle cx="122" cy="85" r="5" fill="#92400e"/>
            <text x="78" y="178">病人頭部</text>
            <line x1="122" y1="85" x2="365" y2="85" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 5"/>
            <text x="205" y="75">保持引流袋位置適當</text>
            <line x1="365" y1="45" x2="365" y2="170" stroke="#2563eb" stroke-width="5"/>
            <rect x="335" y="95" width="60" height="80" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="3"/>
            <text x="333" y="195">引流袋</text>
            <path d="M140 82 C210 20, 300 35, 365 95" stroke="#16a34a" stroke-width="5" fill="none"/>
            <text x="230" y="35">管路勿拉扯</text>
          </svg>
        </div>
        <div class="callout-red">家屬提醒：翻身、坐起、下床或搬動病人時，請注意引流管不要被壓住、扭轉或拉扯。</div>
      </div>`;
    }

    function positionSvg() {
      return `<div class="visual-box"><strong>圖像提醒：偏癱側肢體保護</strong>
        <div class="svg-wrap">
          <svg width="520" height="180" viewBox="0 0 520 180" role="img" aria-label="偏癱肢體擺位示意圖">
            <rect x="40" y="95" width="420" height="45" rx="14" fill="#dbeafe"/>
            <circle cx="140" cy="72" r="28" fill="#fde68a" stroke="#92400e" stroke-width="3"/>

            <li>回診時帶藥袋或用藥清單，讓醫師確認目前藥物。</li>
            <li>觀察是否有異常出血、瘀青或黑便。</li>
            <li>提醒病人不要自行停藥，若有不舒服要先詢問醫師或藥師。</li>
          </ul>
          <div class="callout-red">立即就醫或通知護理師：大量出血、黑便、血尿、吐血、跌倒撞到頭、突然劇烈頭痛、意識變差。</div>
        `, 'warning');
      }

      if (cares.includes('藥物與慢性病控制')) {
        html += block('❤️ 藥物與慢性病控制的重要性', `
          <p><strong>為什麼慢性病控制很重要？</strong><br>高血壓、糖尿病、高血脂、心房顫動等慢性病，都是中風與心血管疾病的重要危險因子。規律服藥、定期回診與生活控制，可以降低再次中風或病情惡化風險。</p>
          ${threeSteps('規律服藥', '定期量測與回診', '飲食運動一起控制')}
          <h4>高血壓控制</h4>
          <ul>
            <li>每天固定時間量血壓並記錄。</li>
            <li>不要因為今天血壓正常就自行停藥。</li>
            <li>少鹽、少醬料、少醃漬加工食品。</li>
            <li>若突然劇烈頭痛、視力模糊、胸悶、喘，需立即就醫。</li>
          </ul>
          <h4>糖尿病控制</h4>
          <ul>
            <li>定時定量用餐，配合降血糖藥或胰島素時間。</li>
            <li>避免含糖飲料、甜點與過量澱粉。</li>
            <li>注意低血糖症狀：冒冷汗、手抖、心悸、頭暈、意識混亂。</li>
          </ul>
          <h4>高血脂控制</h4>
          <ul>
            <li>減少油炸、肥肉、內臟、奶油與加工食品。</li>
            <li>增加蔬菜、全穀類、豆類與適量魚類。</li>
            <li>降血脂藥需依醫囑服用，不可自行停藥。</li>
          </ul>
          <h4>正確服藥觀念</h4>
          <ul>
            <li>藥物是預防復發的重要保護，不是症狀好轉就可以停。</li>
            <li>忘記服藥時，不要自行一次吃雙倍，請依醫師或藥師建議處理。</li>
            <li>看不同科別時，請主動提供目前用藥清單，避免重複或交互作用。</li>
            <li>回診追蹤、抽血檢查與藥物調整都很重要。</li>
          </ul>
          <div class="callout-green">簡單記法：藥要規律吃、數值要記錄、回診要追蹤、生活要一起改。</div>
        `, 'success');
      }

      html += languageTable;

      html += block('✅ 護理師衛教紀錄建議', `<ul>
        <li>□ 已依病人診斷說明主要照護重點。</li>
        <li>□ 已說明紅色警訊與何時需通知護理師。</li>
        <li>□ 已示範翻身、拍痰、擺位或管路照護。</li>
        <li>□ 家屬／看護可正確回覆至少2項注意事項。</li>
        <li>□ 已提供紙本衛教或QR code。</li>
      </ul>`, 'success');

      document.getElementById('result').innerHTML = html;
    }

    function downloadPDF() {
      const originalTitle = document.title;
      const patientName = document.getElementById('patientName').value || '神經病房衛教單';
      document.title = patientName + '_個別化衛教單';

      const printNotice = document.createElement('div');
      printNotice.innerHTML = `
        <div style="position:fixed;top:16px;right:16px;z-index:9999;background:#4f7cff;color:white;padding:12px 16px;border-radius:16px;box-shadow:0 10px 20px rgba(0,0,0,.15);font-weight:700;">
          📄 即將開啟列印視窗<br>
          請選擇：<br>
          「另存為 PDF」即可下載
        </div>
      `;
      document.body.appendChild(printNotice);

      setTimeout(() => {
        window.print();
        setTimeout(() => {
          document.body.removeChild(printNotice);
          document.title = originalTitle;
        }, 800);
      }, 400);
    }

    function resetForm() {
      document.getElementById('patientName').value = '';
      document.getElementById('customDiagnosis').value = '';
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('result').innerHTML = '請先選擇左側病人狀況，點選「產生衛教內容」。';
    }
  </script>
</body>
</html>
