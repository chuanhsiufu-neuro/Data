<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神經照護衛教寶盒 NeuroCare Box</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --primary: #4f7cff;
      --primary-dark: #3158d4;
      --sky: #dff4ff;
      --mint: #dffcf0;
      --peach: #fff1e8;
      --pink: #ffe8f1;
      --lavender: #eee9ff;
      --ink: #1f2937;
      --muted: #64748b;
      --card: rgba(255, 255, 255, .92);
      --line: #dbeafe;
      --shadow: 0 14px 34px rgba(79, 124, 255, .14);
    }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      line-height: 1.75;
      background:
        radial-gradient(circle at 10% 8%, #ffe8f1 0, transparent 28%),
        radial-gradient(circle at 90% 5%, #dff4ff 0, transparent 30%),
        radial-gradient(circle at 88% 88%, #dffcf0 0, transparent 25%),
        linear-gradient(180deg, #f7fbff 0%, #f8fafc 100%);
      min-height: 100vh;
    }
    header {
      position: relative;
      overflow: hidden;
      color: white;
      padding: 38px 20px 34px;
      text-align: center;
      background: linear-gradient(135deg, #6ea8ff 0%, #6c63ff 52%, #8e8cff 100%);
      border-bottom-left-radius: 34px;
      border-bottom-right-radius: 34px;
      box-shadow: 0 16px 36px rgba(49, 88, 212, .25);
    }
    header::before, header::after { content: ""; position: absolute; border-radius: 999px; background: rgba(255,255,255,.22); }
    header::before { width: 160px; height: 160px; left: -50px; top: -45px; }
    header::after { width: 210px; height: 210px; right: -70px; bottom: -105px; }
    header h1 { position: relative; margin: 0; font-size: 34px; letter-spacing: .5px; text-shadow: 0 2px 10px rgba(0,0,0,.12); }
    header h1::before { content: "🧠 "; }
    header h1::after { content: " 🩺"; }
    header p { position: relative; margin: 10px auto 0; font-size: 16px; opacity: .96; max-width: 760px; }
    
    .container { max-width: 1240px; margin: 28px auto; padding: 0 16px 46px; display: grid; grid-template-columns: .95fr 1.18fr; gap: 22px; }
    .card { background: var(--card); border-radius: 28px; padding: 22px; box-shadow: var(--shadow); border: 1px solid rgba(219, 234, 254, .85); backdrop-filter: blur(10px); }
    
    h2 { margin-top: 0; color: #2745b8; font-size: 22px; display: flex; align-items: center; gap: 8px; }
    h2::before { content: "✦"; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 12px; color: white; background: linear-gradient(135deg, #6ea8ff, #8e8cff); box-shadow: 0 8px 18px rgba(79, 124, 255, .22); }
    h3 { color: #243b8f; margin-bottom: 8px; }
    h4 { margin: 12px 0 7px; color: #3158d4; }
    
    .section { margin-bottom: 18px; padding: 14px; border-radius: 20px; background: linear-gradient(180deg, rgba(255,255,255,.84), rgba(248,250,252,.84)); border: 1px solid #edf2ff; }
    .grid-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    
    label.option { display: flex; gap: 9px; align-items: center; background: #ffffff; border: 1px solid #dbeafe; border-radius: 18px; padding: 11px 12px; cursor: pointer; font-size: 15px; transition: .18s ease; box-shadow: 0 5px 14px rgba(148, 163, 184, .10); }
    label.option:hover { transform: translateY(-1px); background: #f0f7ff; border-color: #93c5fd; box-shadow: 0 10px 20px rgba(79, 124, 255, .13); }
    label.option input { width: 18px; height: 18px; accent-color: var(--primary); }
    
    select, input[type="text"] { width: 100%; padding: 12px 14px; border-radius: 16px; border: 1px solid #cfe2ff; font-size: 15px; background: white; outline: none; }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    
    button { border: 0; padding: 12px 19px; border-radius: 999px; font-size: 15px; font-weight: 800; cursor: pointer; transition: .18s ease; }
    button:hover { transform: translateY(-1px); }
    .primary { background: linear-gradient(135deg, #4f7cff, #6c63ff); color: white; box-shadow: 0 10px 20px rgba(79, 124, 255, .28); }
    .primary::before { content: "✨ "; }
    .secondary { background: #e9efff; color: #2745b8; }
    .secondary::before { content: "🖨️ "; }
    .danger { background: #ffe8e8; color: #b42318; }
    .danger::before { content: "↺ "; }
    
    .result-box { background: linear-gradient(180deg, rgba(255,255,255,.86), rgba(248,250,252,.92)); border: 2px dashed #b7d7ff; border-radius: 24px; padding: 18px; min-height: 360px; }
    .tag { display: inline-block; background: linear-gradient(135deg, #e0f2fe, #e9d5ff); color: #2745b8; border-radius: 999px; padding: 5px 11px; margin: 4px; font-size: 13px; font-weight: 800; border: 1px solid rgba(147, 197, 253, .72); }
    .edu-block { background: white; border-radius: 22px; padding: 17px; margin: 16px 0; border: 1px solid #dbeafe; box-shadow: 0 8px 22px rgba(15, 23, 42, .06); position: relative; overflow: hidden; }
    .edu-block::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #6ea8ff, #9b8cff, #74d6b5); }
    
    .warning { background: linear-gradient(180deg, #fffdf8, #fff7ed); border-color: #fed7aa; }
    .warning::before { background: linear-gradient(90deg, #fb7185, #fb923c); }
    .success { background: linear-gradient(180deg, #fbfffd, #f0fdf4); border-color: #bbf7d0; }
    .success::before { background: linear-gradient(90deg, #34d399, #60a5fa); }
    .soft { background: linear-gradient(180deg, #ffffff, #f8fafc); border-color: #e2e8f0; }
    .soft::before { background: linear-gradient(90deg, #94a3b8, #c4b5fd); }
    
    .family-note { background: linear-gradient(135deg, #eef6ff, #f5f3ff); border: 1px solid #dbeafe; border-radius: 16px; padding: 11px 13px; margin: 10px 0; color: #2745b8; font-weight: 800; }
    .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .mini-card { background: linear-gradient(180deg, #ffffff, #f8fbff); border: 1px solid #dbeafe; border-radius: 20px; padding: 12px 10px; text-align: center; min-height: 100px; box-shadow: 0 6px 16px rgba(148, 163, 184, .12); }
    .mini-card .icon { font-size: 32px; display: block; margin-bottom: 4px; }
    
    .callout-red { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; border-radius: 18px; padding: 12px; margin: 12px 0; font-weight: 800; }
    .callout-red::before { content: "🚨 "; }
    .callout-green { background: #ecfdf5; border: 1px solid #bbf7d0; color: #166534; border-radius: 18px; padding: 12px; margin: 12px 0; font-weight: 800; }
    .callout-green::before { content: "🌿 "; }
    
    .visual-box { background: #ffffff; border: 1px solid #c7ddff; border-radius: 20px; padding: 13px; margin-top: 12px; }
    .svg-wrap { display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #eff6ff, #f5f3ff); border-radius: 18px; padding: 12px; margin: 9px 0; overflow-x: auto; }
    svg text { font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; font-size: 13px; fill: #1e3a8a; font-weight: 800; }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; font-size: 14px; overflow: hidden; border-radius: 16px; border: 1px solid #dbeafe; }
    th, td { border-bottom: 1px solid #dbeafe; padding: 9px; text-align: left; vertical-align: top; background: #fff; }
    th { background: linear-gradient(135deg, #e0f2fe, #eef2ff); color: #2745b8; font-weight: 900; }
    ul { padding-left: 22px; } li { margin: 5px 0; }
    
    .print-title { display: none; }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      .grid-options, .mini-grid { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white; }
      header, .input-card, .buttons, .footer-note { display: none !important; }
      .container { display: block; margin: 0; padding: 0; }
      .card { box-shadow: none; border: none; padding: 0; }
      .print-title { display: block; text-align: center; color: #111827; }
      .result-box { border: none; background: white; }
      .edu-block { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>神經照護衛教寶盒 NeuroCare Box</h1>
    <p>神經內外科病房個別化衛教平台｜護理師快速產生家屬版衛教內容</p>
  </header>

  <main class="container">
    <section class="card input-card">
      <h2>一、選擇病人狀況</h2>

      <div class="section">
        <h3>基本資料</h3>
        <input type="text" id="patientName" placeholder="病人姓名或床號，例如：5D-01 王先生" />
      </div>

      <div class="section">
        <h3>診斷（可自行輸入）</h3>
        <input type="text" id="customDiagnosis" placeholder="例如：腦中風、腦出血、癲癇..." />
      </div>

      <div class="section">
        <h3>目前管路或設備</h3>
        <div class="grid-options">
          <label class="option"><input type="checkbox" value="鼻胃管" class="tube" />鼻胃管 NG tube</label>
          <label class="option"><input type="checkbox" value="尿管" class="tube" />尿管 Foley</label>
          <label class="option"><input type="checkbox" value="氣切" class="tube" />氣切 Tracheostomy</label>
          <label class="option"><input type="checkbox" value="引流管" class="tube" />引流管 Drainage Tube</label>
          <label class="option"><input type="checkbox" value="氧氣" class="tube" />氧氣設備 Oxygen</label>
        </div>
      </div>

      <div class="section">
        <h3>主要照護需求</h3>
        <div style="margin:10px 0 14px;background:linear-gradient(135deg,#fff4e6,#fff0f6);padding:12px 14px;border-radius:18px;border:1px solid #fed7aa;color:#c2410c;font-weight:800;">
          ⭐ 腦中風病人記得勾選「腦中風基本認識」作為核心衛教。
        </div>
        <div class="grid-options">
          <label class="option"><input type="checkbox" value="腦中風基本認識" class="care" />腦中風基本認識</label>
          <label class="option"><input type="checkbox" value="抗凝劑使用注意事項" class="care" />抗凝劑／抗血小板藥物注意事項</label>
          <label class="option"><input type="checkbox" value="跌倒預防" class="care" />跌倒預防</label>
          <label class="option"><input type="checkbox" value="吞嚥困難" class="care" />吞嚥困難／嗆咳</label>
          <label class="option"><input type="checkbox" value="翻身拍背" class="care" />翻身與拍痰</label>
          <label class="option"><input type="checkbox" value="偏癱擺位" class="care" />偏癱肢體擺位</label>
          <label class="option"><input type="checkbox" value="壓傷預防" class="care" />壓傷預防</label>
          <label class="option"><input type="checkbox" value="出院長照" class="care" />出院長照銜接</label>
          <label class="option"><input type="checkbox" value="高血糖飲食" class="care" />預防高血糖飲食</label>
          <label class="option"><input type="checkbox" value="高血脂飲食" class="care" />預防高血脂飲食</label>
          <label class="option"><input type="checkbox" value="高血壓照護" class="care" />高血壓照護</label>
          <label class="option"><input type="checkbox" value="被動關節運動" class="care" />被動關節運動</label>
          <label class="option"><input type="checkbox" value="助行器使用" class="care" />助行器使用</label>
          <label class="option"><input type="checkbox" value="約束注意事項" class="care" />約束注意事項</label>
          <label class="option"><input type="checkbox" value="物理復健" class="care" />物理復健</label>
          <label class="option"><input type="checkbox" value="職能復健" class="care" />職能復健</label>
          <label class="option"><input type="checkbox" value="藥物與慢性病控制" class="care" />藥物與慢性病控制的重要性</label>
        </div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="generateEducation()">產生衛教內容</button>
        <button class="secondary" onclick="downloadPDF()">列印／存成PDF</button>
        <button class="danger" onclick="resetForm()">清除重選</button>
      </div>
    </section>

    <section class="card">
      <h2>二、個別化衛教單</h2>
      <h1 class="print-title">神經內外科病房個別化衛教單</h1>
      <div id="result" class="result-box">
        請先選擇左側病人狀況，點選「產生衛教內容」。
      </div>
    </section>
  </main>

  <script>
    // 【新增】自動讀取從 Main 傳過來的臨時個資
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const ptLabel = urlParams.get('pt_label');
        if (ptLabel) {
            document.getElementById('patientName').value = ptLabel;
        }
    };

    const languageTable = `
      <div class="edu-block">
        <h3>🌏 多語言照護提醒</h3>
        <p class="family-note">給外籍看護：以下是病房最常用的照護句子，可搭配動作示範。</p>
        <table>
          <tr><th>中文</th><th>English</th><th>印尼文 Bahasa Indonesia</th></tr>
          <tr><td>每2小時翻身一次</td><td>Turn every 2 hours.</td><td>Miringkan tubuh setiap 2 jam.</td></tr>
          <tr><td>請把床欄拉起來</td><td>Keep the side rails up.</td><td>Naikkan pagar tempat tidur.</td></tr>
          <tr><td>下床前請先按鈴</td><td>Please call the nurse before getting out of bed.</td><td>Tekan bel sebelum turun dari tempat tidur.</td></tr>
          <tr><td>吃東西請慢慢吞</td><td>Eat slowly and swallow carefully.</td><td>Makan perlahan dan telan dengan hati-hati.</td></tr>
          <tr><td>若嗆咳請立即停止餵食</td><td>Stop feeding if choking occurs.</td><td>Hentikan makan jika tersedak.</td></tr>
          <tr><td>不要拉扯管路</td><td>Do not pull the tube.</td><td>Jangan menarik selang.</td></tr>
        </table>
      </div>`;

    function checkedValues(className) { return Array.from(document.querySelectorAll('.' + className + ':checked')).map(el => el.value); }
    function block(title, content, cls = '') { return `<div class="edu-block ${cls}"><h3>${title}</h3>${content}</div>`; }
    function threeSteps(a, b, c) { return `<div class="mini-grid"><div class="mini-card"><span class="icon">1️⃣</span>${a}</div><div class="mini-card"><span class="icon">2️⃣</span>${b}</div><div class="mini-card"><span class="icon">3️⃣</span>${c}</div></div>`; }

    // SVG 圖像產生器（保持不變）
    function strokeFaceArmSpeechSvg() { return `<div class="visual-box"><strong>圖像提醒：FAST 中風警訊</strong><div class="svg-wrap"><svg width="520" height="150" viewBox="0 0 520 150"><circle cx="70" cy="55" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><path d="M55 62 Q70 78 86 62" stroke="#dc2626" stroke-width="4" fill="none"/><circle cx="58" cy="50" r="4" fill="#1e3a8a"/><circle cx="82" cy="50" r="4" fill="#1e3a8a"/><text x="35" y="120">臉歪 Face</text><line x1="150" y1="88" x2="215" y2="45" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/><line x1="150" y1="88" x2="215" y2="105" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/><text x="142" y="120">手無力 Arm</text><rect x="275" y="30" width="95" height="55" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="292" y="63">說不清</text><text x="282" y="120">Speech</text><circle cx="440" cy="58" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/><text x="430" y="64">119</text><text x="397" y="120">立即就醫 Time</text></svg></div></div>`; }
    function evdSvg() { return `<div class="visual-box"><strong>圖像提醒：引流管不可拉扯</strong><div class="svg-wrap"><svg width="520" height="210" viewBox="0 0 520 210"><rect x="40" y="110" width="180" height="48" rx="12" fill="#bfdbfe"/><circle cx="105" cy="85" r="34" fill="#fde68a" stroke="#92400e" stroke-width="3"/><text x="78" y="178">病人頭部</text><line x1="122" y1="85" x2="365" y2="85" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 5"/><line x1="365" y1="45" x2="365" y2="170" stroke="#2563eb" stroke-width="5"/><rect x="335" y="95" width="60" height="80" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="3"/><text x="333" y="195">引流袋</text><path d="M140 82 C210 20, 300 35, 365 95" stroke="#16a34a" stroke-width="5" fill="none"/></svg></div><div class="callout-red">翻身、搬動病人時，請注意引流管不要被壓住或拉扯。</div></div>`; }
    function positionSvg() { return `<div class="visual-box"><strong>圖像提醒：偏癱側肢體保護</strong><div class="svg-wrap"><svg width="520" height="180" viewBox="0 0 520 180"><rect x="40" y="95" width="420" height="45" rx="14" fill="#dbeafe"/><circle cx="140" cy="72" r="28" fill="#fde68a" stroke="#92400e" stroke-width="3"/><line x1="165" y1="95" x2="250" y2="105" stroke="#1e40af" stroke-width="12" stroke-linecap="round"/><rect x="230" y="92" width="95" height="28" rx="10" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/><text x="235" y="86">枕頭支托</text><text x="70" y="165">不要拉患側手臂</text></svg></div></div>`; }
    function turnSvg() { return `<div class="visual-box"><strong>圖像提醒：翻身與減壓</strong><div class="svg-wrap"><svg width="520" height="160" viewBox="0 0 520 160"><rect x="40" y="95" width="420" height="38" rx="14" fill="#e0e7ff"/><ellipse cx="230" cy="80" rx="95" ry="32" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/><text x="345" y="40">每2小時翻身</text></svg></div></div>`; }
    function dietSvg() { return `<div class="visual-box"><strong>圖像提醒：餐盤法</strong><div class="svg-wrap"><svg width="360" height="230" viewBox="0 0 360 230"><circle cx="180" cy="105" r="85" fill="#fff" stroke="#2563eb" stroke-width="4"/><path d="M180 20 A85 85 0 0 1 180 190 Z" fill="#bbf7d0"/><path d="M180 105 L180 20 A85 85 0 0 1 255 145 Z" fill="#fde68a"/><path d="M180 105 L255 145 A85 85 0 0 1 180 190 Z" fill="#bfdbfe"/><text x="75" y="105">1/2 蔬菜</text><text x="198" y="82">1/4 全穀</text><text x="198" y="145">1/4 蛋白質</text></svg></div></div>`; }

    function generateEducation() {
      const name = document.getElementById('patientName').value || '未填寫';
      const tubes = checkedValues('tube');
      const cares = checkedValues('care');

      let html = `
        <p><strong>病人／床號：</strong>${name}</p>
        ${document.getElementById('customDiagnosis').value ? `<p><strong>診斷：</strong><span class="tag">${document.getElementById('customDiagnosis').value}</span></p>` : ''}
        <p><strong>管路：</strong>${tubes.length ? tubes.map(t => `<span class="tag">${t}</span>`).join('') : '無特殊管路'}</p>
        <p><strong>照護需求：</strong>${cares.length ? cares.map(c => `<span class="tag">${c}</span>`).join('') : '尚未選擇'}</p>
      `;

      html += block('給家屬與看護的使用說明', `<div class="family-note">這份衛教單是協助您照顧病人的提醒。若病人狀況改變，請以護理師及醫師說明為主。</div>${threeSteps('先看紅色警訊', '照著步驟協助照護', '不確定就按鈴詢問')}`, 'soft');

      if (cares.includes('腦中風基本認識')) {
        html += block('🧠 腦中風基本認識', `<p><strong>什麼是腦中風？</strong><br>腦中風是因腦部血管阻塞或破裂，造成腦部血流不足或出血。${strokeFaceArmSpeechSvg()}<h4>家屬要會辨識 FAST</h4><ul><li><strong>F Face 臉：</strong>嘴角歪斜、臉不對稱。</li><li><strong>A Arm 手：</strong>單側手腳無力、抬不起來。</li><li><strong>S Speech 說話：</strong>說話不清楚。</li><li><strong>T Time 時間：</strong>發現症狀立刻通知醫護。</li></ul>`, 'warning');
      }

      if (tubes.includes('引流管')) {
        html += block('🚨 引流管照護注意事項', `<p><strong>引流管照護重點：</strong>${evdSvg()}<h4>家屬安全須知</h4><ul><li><strong>引流管絕對不可拔除或拉扯！</strong></li><li>翻身移動時，先確認管路未被壓住或拉緊。</li><li>不可自行調整高度。</li></ul>`, 'warning');
      }

      if (tubes.includes('鼻胃管')) {
        html += block('🥣 鼻胃管照護', `${threeSteps('灌食前床頭抬高30-45度', '灌食中慢慢灌勿太快', '灌食後維持坐高30分鐘')}<ul><li>不要自行調整鼻胃管固定膠帶。</li></ul>`);
      }

      if (tubes.includes('尿管')) {
        html += block('🚽 尿管照護', `${threeSteps('尿袋低於膀胱', '管路不壓折不拉扯', '會陰部保持清潔')}`);
      }

      if (tubes.includes('氣切')) {
        html += block('🫁 氣切照護', `${threeSteps('觀察呼吸是否順暢', '協助拍痰與姿位引流', '保持固定帶與敷料清潔')}`, 'warning');
      }

      if (tubes.includes('氧氣')) {
        html += block('🌬️ 氧氣設備注意事項', `${threeSteps('氧氣管勿壓折', '鼻導管位置要正確', '遠離火源')}`);
      }

      if (cares.includes('跌倒預防')) {
        html += block('⚠️ 跌倒預防守則', `${threeSteps('先坐起', '坐穩1分鐘確認不頭暈', '扶好再慢慢站起')}<h4>如廁陪伴守則</h4><ul><li>照顧者需陪同進入廁所內，不要只在門外等。</li><li>夜間開夜燈，床欄拉起鎖好。</li></ul>`, 'warning');
      }

      if (cares.includes('高血壓照護')) {
        html += block('🩺 高血壓照護與量血壓', `${threeSteps('固定時間量血壓', '正確姿勢測量', '記錄數值給醫護參考')}<ul><li>量血壓時不要說話、不要翹腳、不要隔著厚衣服。</li></ul>`, 'warning');
      }

      if (cares.includes('吞嚥困難')) {
        html += block('🥄 吞嚥安全與嗆咳預防', `${threeSteps('坐正或床頭抬高', '一口少量慢慢吞', '傳統質地依治療師指導')}<div class="callout-red">若發生嗆咳，立即停止餵食並通知護理師。</div>`, 'warning');
      }

      if (cares.includes('翻身拍背')) {
        html += block('🤲 翻身與拍痰', `${turnSvg()}${threeSteps('翻身前先整理管路', '用枕頭支托身體', '空杯手輕拍背部')}`);
      }

      if (cares.includes('偏癱擺位')) {
        html += block('🖐️ 偏癱肢體擺位', `${positionSvg()}${threeSteps('患側手臂用枕頭支托', '避免拉手臂起身', '手指腕關節自然伸展')}`);
      }

      if (cares.includes('壓傷預防')) {
        html += block('🛏️ 壓傷預防', `${threeSteps('至少每2小時翻身', '保持皮膚乾爽', '檢查骨頭突出處')}`);
      }

      if (cares.includes('出院長照')) {
        html += block('🏠 出院後長照資源', `${threeSteps('出院前先提出需求', '由個管師/社工協助評估', '返家後銜接服務')}`, 'success');
      }

      if (cares.includes('高血糖飲食')) {
        html += block('🍚 糖尿病／預防高血糖飲食', `${dietSvg()}<h4>飲食原則</h4><ul><li>定時定量、少油少加工、多選纖維質豐富食物。</li></ul>`);
      }

      if (cares.includes('高血脂飲食')) {
        html += block('🥗 高血脂症飲食注意事項', `${dietSvg()}<ul><li>清蒸、水煮、涼拌、避免油煎油炸、少吃內臟與蟹黃。</li></ul>`);
      }

      if (cares.includes('被動關節運動')) {
        html += block('🦵 被動關節運動', `${threeSteps('動作慢', '不痛為原則', '每關節10下，每天2-3次')}`);
      }

      if (cares.includes('助行器使用')) {
        html += block('🚶 助行器使用注意事項', `${threeSteps('助行器先往前', '患肢往前', '健肢再往前')}`, 'warning');
      }

      if (cares.includes('約束注意事項')) {
        html += block('🛑 約束注意事項', `${threeSteps('保護保護安全', '避免躁動拔管', '定時解除評估')}`, 'warning');
      }

      if (cares.includes('物理復健')) {
        html += block('🏃 物理復健', `${threeSteps('維持肌力', '增加活動能力', '降低臥床併發症')}`, 'success');
      }

      if (cares.includes('職能復健')) {
        html += block('🖐️ 職能復健', `${threeSteps('恢復生活功能', '手部精細功能訓練', '提升自我照顧能力')}`, 'success');
      }

      if (cares.includes('抗凝劑使用注意事項')) {
        html += block('💊 抗凝劑／抗血小板藥物注意事項', `${threeSteps('每天固定時間服藥', '不可自行停藥', '注意出血警訊')}<div class="callout-red">若出現流鼻血、黑便、血尿或撞到頭，請立即就醫。</div>`, 'warning');
      }

      if (cares.includes('藥物與慢性病控制')) {
        html += block('❤️ 藥物與慢性病控制', `${threeSteps('規律服藥', '定期量測與回診', '飲食運動一起控制')}`, 'success');
      }

      html += languageTable;
      document.getElementById('result').innerHTML = html;

      // 🔥【深度連動】：將產生的衛教 HTML，即時回傳給父視窗 (Main.html) 呈現
      if (window.opener) {
          window.opener.postMessage({
              type: "REHAB_OUTPUT_HTML",
              htmlContent: html
          }, "*");
      }
    }

    function downloadPDF() {
      const originalTitle = document.title;
      const patientName = document.getElementById('patientName').value || '神經病房衛教單';
      document.title = patientName + '_個別化衛教單';
      window.print();
      document.title = originalTitle;
    }

    function resetForm() {
      document.getElementById('patientName').value = '';
      document.getElementById('customDiagnosis').value = '';
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('result').innerHTML = '請先選擇左側病人狀況，點選「產生衛教內容」。';
    }
  </script>
</body>
</html>
