<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        
        /* 頂部標題 */
        .edit-header { background-color: #1e1e1e; padding: 12px; text-align: center; border-bottom: 2px solid #00adb5; font-size: 18px; font-weight: bold; color: #00adb5; }
        
        /* 表單捲動區塊 */
        .form-container { flex: 1; overflow-y: auto; padding: 10px 15px 20px 15px; }
        
        /* 橢圓塊狀的區塊標題設計 */
        .section-title {
            background-color: #00adb5;
            color: #121212;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin: 20px 0 10px 0;
            box-shadow: 0 2px 8px rgba(0, 173, 181, 0.4);
        }
        /* 第一個標題取消上方 margin */
        .form-container .section-title:first-child { margin-top: 5px; }

        /* 雙欄表單網格 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 11px;
            color: #aaaaaa;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .form-group input {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        .form-group input:focus { outline: none; border-color: #00adb5; }
        
        /* 特別處理：少數需要橫跨整行的長欄位 (如描述或位置) */
        .full-width { grid-column: 1 / -1; }

        /* ----------------------------------
           底部極限單行操作列 (3 鈕 + 3 空格)
        ------------------------------------- */
        .bottom-action-bar {
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 10px 5px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 平分成三等份 */
            gap: 5px;
        }
        
        /* 每個動作群組 (按鈕+空格 綁在一起) */
        .action-group {
            display: flex;
            background-color: #121212;
            border: 1px solid #444;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .icon-btn {
            width: 36px;
            background-color: #333;
            border: none;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-upload { background-color: #00adb5; color: #121212; }
        .btn-download { background-color: #ffb400; color: #121212; }
        .btn-home { background-color: #4CAF50; color: #121212; }
        
        .action-input {
            flex: 1;
            min-width: 0; /* 防止撐破 Flexbox */
            background: transparent;
            border: none;
            color: #fff;
            font-size: 12px;
            text-align: center;
            padding: 0 4px;
        }
        .action-input:focus { outline: none; background-color: #1e1e1e; }
        /* 替換 placeholder 顏色 */
        .action-input::placeholder { color: #666; font-size: 10px; }
    </style>
</head>
<body>

    <header class="edit-header">Patient Profile Edit</header>

    <div class="form-container" id="dynamic-form-container"></div>

    <div class="bottom-action-bar">
        <div class="action-group">
            <button class="icon-btn btn-upload" onclick="doUpload()" title="上傳/更新"><i class="bi bi-cloud-arrow-up-fill"></i></button>
            <input type="text" class="action-input" id="in-upload-id" placeholder="存檔編號">
        </div>
        
        <div class="action-group">
            <button class="icon-btn btn-download" onclick="doDownload()" title="載入資料"><i class="bi bi-cloud-arrow-down-fill"></i></button>
            <input type="text" class="action-input" id="in-download-id" placeholder="載入編號">
        </div>

        <div class="action-group">
            <button class="icon-btn btn-home" onclick="goHome()" title="回主畫面"><i class="bi bi-house-door-fill"></i></button>
            <input type="text" class="action-input" id="in-home-id" placeholder="首頁編號">
        </div>
    </div>

    <script>
        // ==========================================
        // 表單欄位區塊資料結構
        // ==========================================
        const formSections = [
            {
                title: "Overview",
                fields: ["Ward No.", "Strokeclcock No.", "Age", "Sex", "BH", "BW", "Stroke type", "Etiology", "Stroke onset", "ER", "入院", "出院"]
            },
            {
                title: "Past history",
                fields: ["Pre-mR", "DM", "HTN", "Hyperlipidemia", "AF", "CAD", "HF", "CKD", "ESRD", "Dialysis", "Prior stroke", "Previous TIA", "Prio ICH", "Cancer", "Cancer type", "Active", "Smoking", "Smoking amount", "Alcohol", "Alcohol amount"]
            },
            {
                title: "Present illness",
                fields: ["發現異常時間", "最後正常時間", "ER GCS", "ER SBP", "ER DBP", "現在病史(主要症狀/肌力)", "NIHSS", "NE", "懷疑病灶位置"]
            },
            {
                title: "ER Imaging/Lab",
                fields: ["NCCT時間", "Brain NCCT影像描述", "Hb", "Hct", "WBC", "PLT", "ALT", "Cre", "Glucose(ER)", "D-dimer", "PT", "INR", "aPTT"]
            },
            {
                title: "Management",
                fields: ["Ischemic stroke Diagnosis", "tPA有無", "tPA Dose", "tPA Bolus dose", "tPA Bolus時間", "tPA未打原因", "EVT有無", "Puncture時間", "Recanalization 時間", "mTICI", "Post-EVT BP goal", "Minor stroke/TIA", "ABCD2 score", "DAPT/SAPT", "antiplatelet種類", "anticoagulation", "ICH Diagnosis", "ICH volume", "ICH score", "Transamine", "Operation"]
            },
            {
                title: "Other lab/MRI",
                fields: ["HbA1C", "T-CHO", "TG", "HDL", "LDL", "Brain MRI", "DWI", "intracranial MRA", "extracranial MRA", "SWI CMB", "Fazeka"]
            },
            {
                title: "Work-up/Etiology",
                fields: ["CCD/TCD", "TOAST", "SMASH-U"]
            },
            {
                title: "最後編輯時間",
                fields: ["最後編輯時間"]
            }
        ];

        // ==========================================
        // 動態生成 UI 渲染邏輯
        // ==========================================
        const container = document.getElementById('dynamic-form-container');
        let fieldIndex = 0; // 用於追蹤全域欄位索引 (對應 Excel 欄位順序)

        formSections.forEach(section => {
            // 1. 生成橢圓形區塊標題
            const secTitle = document.createElement('div');
            secTitle.className = 'section-title';
            secTitle.textContent = section.title;
            container.appendChild(secTitle);

            // 2. 生成雙欄網格容器
            const grid = document.createElement('div');
            grid.className = 'form-grid';

            section.fields.forEach(fieldName => {
                const group = document.createElement('div');
                group.className = 'form-group';
                
                // 針對文字通常較長的欄位，給予全寬顯示
                if(fieldName.includes("描述") || fieldName.includes("病史") || fieldName.includes("原因")) {
                    group.classList.add('full-width');
                }

                group.innerHTML = `
                    <label>${fieldName}</label>
                    <input type="text" id="field_${fieldIndex}" placeholder="輸入 ${fieldName}">
                `;
                grid.appendChild(group);
                fieldIndex++;
            });

            container.appendChild(grid);
        });

        // ==========================================
        // 互動與按鈕邏輯
        // ==========================================
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const suggestedId = urlParams.get('suggested_id');
            if (suggestedId) {
                document.getElementById('in-upload-id').value = suggestedId;
                document.getElementById('in-home-id').value = suggestedId;
            }
        };

        function doUpload() {
            const caseId = document.getElementById('in-upload-id').value;
            if(!caseId) return alert("請確認上傳編號欄位不為空！");
            alert(`[上傳模擬] 準備將表單寫入 Excel (Ward分頁)，個案編號: ${caseId}`);
        }

        function doDownload() {
            const caseId = document.getElementById('in-download-id').value;
            if(!caseId) return alert("請輸入想要載入編輯的編號！");
            document.getElementById('in-upload-id').value = caseId;
            document.getElementById('in-home-id').value = caseId;
            alert(`[下載模擬] 已載入個案 ${caseId} 的資料！`);
        }

        function goHome() {
            const caseId = document.getElementById('in-home-id').value;
            window.location.href = caseId ? `Main.html?load_id=${caseId}` : `Main.html`;
        }
    </script>
</body>
</html>
