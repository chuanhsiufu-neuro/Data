<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* 頂部標題列 */
        .edit-header {
            background-color: #1e1e1e;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #00adb5;
            font-size: 18px;
            font-weight: bold;
            color: #00adb5;
        }
        
        /* 表單區域 */
        .form-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaaaaa;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .form-group input {
            width: 100%;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00adb5;
        }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; min-width: 0; /* 防止超出邊界 */ }

        /* ----------------------------------
           底部三大複合按鈕區塊
        ------------------------------------- */
        .bottom-action-bar {
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            color: #121212;
        }
        .btn-upload { background-color: #00adb5; }
        .btn-download { background-color: #ffb400; }
        .btn-home { background-color: #4CAF50; }
        .icon-btn:active { filter: brightness(0.8); }

        .action-input {
            flex: 1;
            height: 40px;
            background-color: #121212;
            border: 1px solid #444;
            color: #00adb5;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-radius: 6px;
        }
        .action-label {
            width: 75px;
            font-size: 12px;
            color: #ccc;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <header class="edit-header">
        Patient Profile (Ward)
    </header>

    <div class="form-container" id="dynamic-form-container">
        </div>

    <div class="bottom-action-bar">
        <div class="action-row">
            <button class="icon-btn btn-upload" onclick="doUpload()"><i class="bi bi-cloud-arrow-up-fill"></i></button>
            <input type="text" class="action-input" id="in-upload-id" placeholder="新/舊編號">
            <span class="action-label">更新/新增<br>寫入表單</span>
        </div>
        
        <div class="action-row">
            <button class="icon-btn btn-download" onclick="doDownload()"><i class="bi bi-cloud-arrow-down-fill"></i></button>
            <input type="text" class="action-input" id="in-download-id" placeholder="輸入編號" style="color: #ffb400;">
            <span class="action-label">載入舊案<br>進行編輯</span>
        </div>

        <div class="action-row">
            <button class="icon-btn btn-home" onclick="goHome()"><i class="bi bi-house-door-fill"></i></button>
            <input type="text" class="action-input" id="in-home-id" placeholder="輸入編號" style="color: #4CAF50;">
            <span class="action-label">回主畫面<br>並載入</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心設定區：請將 Excel A1 到 CD1 的標題貼在下方陣列中！
        // ==========================================
        const excelHeaders = [
            "年齡 Age", "性別 Gender", "身高 (cm)", "體重 (kg)", "中風診斷", "病因",
            "Onset Date", "ER Date", "入院 Date", "出院 Date", "NIHSS (Initial)", 
            "GCS (E)", "GCS (V)", "GCS (M)", "BP (Sys)", "BP (Dia)",
            // ... (請依樣畫葫蘆，用引號 " " 將剩下的 70 幾個標題包起來，並用逗號分隔)
        ];

        // 動態生成 80 幾個欄位的 UI 渲染邏輯
        const container = document.getElementById('dynamic-form-container');
        let rowDiv;

        excelHeaders.forEach((title, index) => {
            // 每兩個欄位包在同一行，節省手機螢幕垂直空間
            if (index % 2 === 0) {
                rowDiv = document.createElement('div');
                rowDiv.className = 'form-row';
                container.appendChild(rowDiv);
            }

            // 建立輸入群組
            const groupDiv = document.createElement('div');
            groupDiv.className = 'form-group';

            // 建立標籤 Label
            const label = document.createElement('label');
            label.textContent = title;

            // 建立輸入框 Input (自動賦予流水號 ID，方便未來抓資料)
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'field_' + index; 
            input.placeholder = title;

            groupDiv.appendChild(label);
            groupDiv.appendChild(input);
            rowDiv.appendChild(groupDiv);
        });

        // ==========================================
        // 互動與按鈕邏輯
        // ==========================================

        // 載入時，抓取 Main.html 透過網址傳來的編號
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const suggestedId = urlParams.get('suggested_id');
            if (suggestedId) {
                document.getElementById('in-upload-id').value = suggestedId;
                document.getElementById('in-home-id').value = suggestedId;
            }
        };

        // 按鈕 1：上傳功能
        function doUpload() {
            const caseId = document.getElementById('in-upload-id').value;
            if(!caseId) return alert("請確認上傳編號欄位不為空！");
            
            // 未來可在這裡抓取 80 幾個欄位的值，如: const val1 = document.getElementById('field_0').value;
            alert(`[上傳觸發]\n即將把畫面上的 ${excelHeaders.length} 項資料，寫入 Excel 個案：${caseId}`);
        }

        // 按鈕 2：下載功能
        function doDownload() {
            const caseId = document.getElementById('in-download-id').value;
            if(!caseId) return alert("請輸入想要載入編輯的編號！");
            
            document.getElementById('in-upload-id').value = caseId;
            document.getElementById('in-home-id').value = caseId;
            alert(`[下載觸發]\n即將從 Excel 載入個案 ${caseId} 的資料至表單...`);
        }

        // 按鈕 3：回主畫面 (連動已修改為 Main.html)
        function goHome() {
            const caseId = document.getElementById('in-home-id').value;
            if(caseId) {
                window.location.href = `Main.html?load_id=${caseId}`;
            } else {
                window.location.href = `Main.html`;
            }
        }
    </script>
</body>
</html>
